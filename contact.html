<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Mithil Patel</title>
    <link rel="icon" type="image/png" href="dallogo.png">
    <style>
        :root { 
            --bg: #0A192F; 
            --text: #ffffff; 
            --accent: #172a45; 
        }

        body { 
            font-family: Arial, sans-serif; 
            margin: 0; 
            background-color: var(--bg); 
            color: var(--text); 
            text-align: center; 
            transition: 0.3s;
        }

        nav { 
            background-color: var(--accent); 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
            gap: 30px; 
        }

        nav a { 
            color: var(--text); 
            text-decoration: none; 
            font-weight: bold; 
        }

        .theme-area { 
            text-align: center; 
            margin: 20px; 
        }

        .box { 
            background-color: var(--accent); 
            display: inline-block; 
            padding: 40px; 
            margin-top: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--text);
        }

        footer { 
            text-align: center; 
            padding: 20px; 
            background-color: var(--accent); 
            margin-top: 50px; 
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">HOME</a>
        <a href="projects.html">PROJECTS</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <div class="theme-area">
        <button id="btn-sapphire">Blue Theme</button>
        <button id="btn-light">Light Theme</button>
        <button id="btn-contrast">High Contrast</button>
    </div>

    <h2 id="greeting"></h2>
    
    <img src="circuit.png" width="350" height="350" alt="Contact banner image">
    <h1>Let's Connect</h1>

    <div class="box">
        <p>Email: <a href="mailto:mithil.patel@dal.ca" style="color: inherit;">mithil.patel@dal.ca</a></p>
        <p>Available for collaboration</p>
    </div>

    <footer>&copy; Mithil Patel</footer>

    <script>
        // JS Requirement: Conditional status message [cite: 23]
        const hour = new Date().getHours();
        const greetElement = document.getElementById('greeting');
        
        if (hour > 17) { 
            greetElement.innerText = "Catch you tomorrow!"; 
        } else { 
            greetElement.innerText = "Happy to help!"; 
        }

        // JS Requirement: Event Handlers for UI changes [cite: 25]
        const root = document.documentElement;

        document.getElementById('btn-sapphire').onclick = function() {
            root.style.setProperty('--bg', '#0A192F'); 
            root.style.setProperty('--text', '#ffffff'); 
            root.style.setProperty('--accent', '#172a45');
        };

        document.getElementById('btn-light').onclick = function() {
            root.style.setProperty('--bg', '#ffffff'); 
            root.style.setProperty('--text', '#000000'); 
            root.style.setProperty('--accent', '#e0e0e0');
        };

        document.getElementById('btn-contrast').onclick = function() {
            root.style.setProperty('--bg', '#000000'); 
            root.style.setProperty('--text', '#ffff00'); 
            root.style.setProperty('--accent', '#333333');
        };
    </script>
</body>
</html>
